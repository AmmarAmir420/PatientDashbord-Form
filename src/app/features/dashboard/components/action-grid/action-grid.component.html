<app-ui-card>
  <div class="grid grid-cols-3 gap-x-3 gap-y-4">
    @for (action of actions; track action.label) {
      <app-icon-tile-button
        [icon]="action.icon"
        [label]="action.label"
        (pressed)="openAction(action)"
      />
    }
    <app-icon-tile-button icon="add" [large]="true" (pressed)="createCustomAction()" />
  </div>
</app-ui-card>
