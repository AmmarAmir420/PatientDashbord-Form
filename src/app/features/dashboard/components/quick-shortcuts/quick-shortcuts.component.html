<nav
  class="grid grid-cols-2 gap-3 rounded-2xl bg-shortcuts-bar px-3 py-4 min-[420px]:grid-cols-3 sm:gap-4 sm:px-5 sm:py-5 md:grid-cols-4 lg:flex lg:flex-wrap lg:justify-between lg:rounded-[20px] lg:px-6"
  aria-label="Quick actions"
>
  @for (shortcut of shortcuts(); track shortcut.label) {
    <app-icon-tile-button
      [icon]="shortcut.icon"
      [label]="shortcut.label"
      [badge]="shortcut.badge"
      (pressed)="onShortcutClick(shortcut)"
    />
  }
</nav>
