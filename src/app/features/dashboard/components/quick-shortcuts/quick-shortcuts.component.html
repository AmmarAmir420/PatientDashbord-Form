<nav class="shortcuts" aria-label="Quick actions">
  @for (shortcut of shortcuts(); track shortcut.label) {
    <button type="button" class="shortcuts__item" (click)="onShortcutClick(shortcut)">
      <span
        class="shortcuts__icon-wrap"
        [matBadge]="shortcut.badge"
        [matBadgeHidden]="!shortcut.badge"
        matBadgeColor="primary"
        matBadgeSize="small"
      >
        <mat-icon>{{ shortcut.icon }}</mat-icon>
      </span>
      <span class="shortcuts__label">{{ shortcut.label }}</span>
    </button>
  }
</nav>
