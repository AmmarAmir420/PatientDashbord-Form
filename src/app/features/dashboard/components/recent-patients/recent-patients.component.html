<app-ui-card>
  <h2 class="m-0 mb-4 text-lg font-semibold text-gray-900 sm:text-xl">{{ copy.recentPatients }}</h2>

  <app-search-input
    class="mb-2"
    [placeholder]="copy.patientSearchPlaceholder"
    [showPrefixIcon]="true"
    [showSuffixIcon]="false"
    [value]="localSearchQuery()"
    (valueChange)="onSearch($event)"
  />

  <ul class="m-0 max-h-80 list-none overflow-y-auto p-0">
    @for (patient of patients(); track patient.id) {
      <li>
        <button
          type="button"
          class="flex w-full min-w-0 cursor-pointer items-center gap-1 border-none border-b border-gray-100 bg-transparent px-1 py-2.5 text-left text-sm text-gray-700 hover:bg-gray-50 hover:text-brand-primary"
          (click)="openPatient(patient)"
        >
          <span class="shrink-0 text-lg text-gray-400">›</span>
          <span class="min-w-0 truncate">{{ patient.name }} – {{ patient.personalId }}</span>
        </button>
      </li>
    }
  </ul>
</app-ui-card>
