<section class="worklist-card">
  <header class="worklist-card__header">
    <h2 class="worklist-card__title">{{ worklistDayLabel[store.worklistDay()] }}</h2>
    <button type="button" class="worklist-card__calendar-btn" (click)="openCalendar()">
      <mat-icon>calendar_month</mat-icon>
      Calendar
    </button>
  </header>

  <nav class="worklist-card__nav">
    <button
      type="button"
      class="worklist-card__nav-link"
      [disabled]="store.worklistDay() === 'yesterday'"
      (click)="showPreviousList()"
    >
      &lt; Yesterday's list
    </button>
    <button
      type="button"
      class="worklist-card__nav-link"
      [disabled]="store.worklistDay() === 'tomorrow'"
      (click)="showNextList()"
    >
      Tomorrow's list &gt;
    </button>
  </nav>

  <div class="worklist-card__list">
    @if (store.worklistAppointments().length === 0) {
      <p class="worklist-card__empty">No appointments match your search.</p>
    } @else {
      @for (appointment of store.worklistAppointments(); track appointment.id) {
        <app-worklist-item
          [appointment]="appointment"
          [expanded]="store.isExpanded(appointment.id)"
          (expandedChange)="store.setExpanded(appointment.id, $event)"
        />
      }
    }
  </div>
</section>
