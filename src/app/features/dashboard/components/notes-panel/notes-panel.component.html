<app-ui-card>
  <app-section-header [title]="copy.notes">
    <div actions class="flex gap-1">
      <button
        type="button"
        class="inline-flex size-9 cursor-pointer items-center justify-center rounded-lg border-none bg-transparent text-gray-500 hover:bg-gray-100"
        aria-label="Download notes"
        (click)="store.downloadNotes()"
      >
        <mat-icon>download</mat-icon>
      </button>
      <button
        type="button"
        class="inline-flex size-9 cursor-pointer items-center justify-center rounded-lg border-none bg-transparent text-gray-500 hover:bg-gray-100"
        aria-label="Delete notes"
        (click)="store.deleteNotes()"
      >
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
  </app-section-header>

  <div class="mt-4 grid grid-cols-2 gap-3 min-[480px]:grid-cols-3 lg:flex lg:flex-wrap">
    <button
      type="button"
      class="flex aspect-[6/5] w-full cursor-pointer items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 text-gray-400 hover:bg-gray-100 hover:text-gray-600 sm:aspect-auto sm:size-[100px] sm:w-[120px]"
      aria-label="Add note"
      (click)="store.addNote()"
    >
      <mat-icon class="text-[28px] sm:text-[32px]">add</mat-icon>
    </button>

    @for (note of store.notes(); track note.id) {
      <article
        class="flex aspect-[6/5] w-full flex-col rounded-xl border border-amber-200 bg-amber-50 p-3 sm:aspect-auto sm:size-[100px] sm:w-[120px]"
      >
        <p class="m-0 line-clamp-4 overflow-hidden text-xs leading-snug text-amber-900">{{ note.preview }}</p>
      </article>
    }
  </div>
</app-ui-card>
