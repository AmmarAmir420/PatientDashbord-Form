<app-ui-card>
  <app-section-header [title]="copy.notes">
    <div actions class="flex gap-1">
      <button
        type="button"
        class="inline-flex size-9 cursor-pointer items-center justify-center rounded-lg border-none bg-transparent text-gray-500 hover:bg-gray-100"
        aria-label="Download notes"
        (click)="store.downloadNotes()"
      >
        <mat-icon>download</mat-icon>
      </button>
      <button
        type="button"
        class="inline-flex size-9 cursor-pointer items-center justify-center rounded-lg border-none bg-transparent text-gray-500 hover:bg-gray-100"
        aria-label="Delete notes"
        (click)="store.deleteNotes()"
      >
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
  </app-section-header>

  <div class="mt-4 flex flex-wrap gap-3">
    <button
      type="button"
      class="flex size-[100px] w-[120px] cursor-pointer items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 text-gray-400 hover:bg-gray-100 hover:text-gray-600"
      aria-label="Add note"
      (click)="store.addNote()"
    >
      <mat-icon class="!text-[32px]">add</mat-icon>
    </button>

    @for (note of store.notes(); track note.id) {
      <article
        class="flex size-[100px] w-[120px] flex-col rounded-xl border border-amber-200 bg-amber-50 p-3"
      >
        <p class="m-0 text-xs leading-snug text-amber-900">{{ note.preview }}</p>
      </article>
    }
  </div>
</app-ui-card>
