<div class="flex items-center justify-between gap-6 px-4 py-3 md:px-6">
  <div class="mx-auto flex w-full max-w-[520px] flex-1 justify-center">
    <app-search-input
      [placeholder]="copy.searchPlaceholder"
      [value]="searchQuery()"
      (valueChange)="onSearch($event)"
    />
  </div>

  <div class="flex shrink-0 items-center gap-1">
    <app-icon-button [ariaLabel]="copy.notifications" (pressed)="onNotificationClick()">
      <mat-icon>notifications_none</mat-icon>
    </app-icon-button>

    <div class="relative">
      <button
        type="button"
        class="inline-flex h-11 cursor-pointer items-center rounded-full border-none bg-transparent px-2 transition-colors hover:bg-gray-50"
        [class.bg-gray-100]="profileMenuOpen()"
        [matMenuTriggerFor]="profileMenu"
        (menuOpened)="profileMenuOpen.set(true)"
        (menuClosed)="profileMenuOpen.set(false)"
      >
        <span class="flex items-center gap-2">
          <app-avatar [initials]="user().avatarInitials" />
          <span class="hidden text-sm font-medium text-gray-900 md:inline">{{ user().fullName }}</span>
          <mat-icon class="size-5 text-[20px] text-gray-500">expand_more</mat-icon>
        </span>
      </button>

      <mat-menu #profileMenu="matMenu" xPosition="before" class="profile-menu-panel">
        <div class="w-[280px] py-2" (click)="$event.stopPropagation()">
          <div class="border-b border-gray-200 px-4 pb-3">
            <p class="m-0 text-[15px] font-semibold text-gray-900">{{ user().fullName }}</p>
            <p class="mt-1 mb-0 text-[13px] text-gray-600">{{ user().role }}</p>
            <p class="mt-0.5 mb-0 text-xs text-gray-400">{{ user().employeeId }}</p>
          </div>
          @for (item of menuItems; track item.label) {
            <button
              type="button"
              class="flex w-full cursor-pointer items-center gap-3 border-none bg-transparent px-4 py-2.5 text-left text-sm text-gray-700 transition-colors hover:bg-gray-50"
              (click)="onProfileAction(item.action)"
            >
              <mat-icon class="size-5 text-[20px] text-gray-500">{{ item.icon }}</mat-icon>
              <span>{{ item.label }}</span>
            </button>
          }
        </div>
      </mat-menu>
    </div>
  </div>
</div>
